config:
  name: 'DevOps-Interview-Questions: ArgoCD Core'
  description: Core ArgoCD concepts including architecture, installation, applications, repositories, source types,
    sync behavior, hooks, waves, projects, authentication, RBAC, and secure day-to-day operations.
  questionDelay: 1
  answerDelay: 1
questions:
- question: What is argocd-server?
  answer: argocd-server exposes the ArgoCD API, web UI, and CLI endpoints. It handles authentication, authorization,
    session management, and user-facing operations, while the application-controller performs reconciliation.
- question: What is the ArgoCD application-controller?
  answer: The application-controller is the core reconciliation engine in ArgoCD. It compares desired state from
    Git with live cluster state, calculates diffs, triggers sync operations, updates application status, and manages
    health.
- question: What is argocd-repo-server?
  answer: The repo-server fetches repositories and renders manifests for ArgoCD. It runs tools such as Helm, Kustomize,
    Jsonnet, and config management plugins, then returns generated manifests to the controller for comparison and
    sync.
- question: Why does ArgoCD use Redis?
  answer: ArgoCD uses Redis as a cache and lightweight coordination layer to reduce repeated repository and application
    computations. It helps improve responsiveness for UI and controller operations, especially in larger setups.
- question: What is Dex in an ArgoCD installation?
  answer: Dex is an identity broker often bundled with ArgoCD for single sign-on. It connects ArgoCD to upstream
    identity providers such as GitHub, GitLab, LDAP, or OIDC providers and issues identities ArgoCD can authorize.
- question: What is the ApplicationSet controller?
  answer: The ApplicationSet controller generates ArgoCD Application resources from templates and generators. It
    is useful when you need to create many similar applications across clusters, environments, or repository paths.
- question: What is the normal request flow inside ArgoCD?
  answer: A user or automation requests an action through the API/UI/CLI, argocd-server authenticates and authorizes
    it, the controller coordinates reconciliation, and the repo-server renders manifests from the configured source.
    The controller then compares rendered state with the cluster and applies changes if needed.
- question: Which ArgoCD component actually reconciles applications?
  answer: The application-controller performs reconciliation. The server is mostly the user-facing API layer, while
    the repo-server generates manifests used by the controller.
- question: Is ArgoCD state stored only in Git?
  answer: Git stores the desired configuration, but ArgoCD also stores operational state in Kubernetes custom resources,
    ConfigMaps, Secrets, and caches. Git is the source of truth for desired manifests, not for runtime controller
    state.
- question: What are the common ways to install ArgoCD?
  answer: ArgoCD is commonly installed using the official raw manifests, the Helm chart, or an existing GitOps bootstrap
    flow. Teams typically choose Helm for parameterized installs and raw manifests for simple, explicit setups.
- question: Why is ArgoCD usually installed in its own namespace?
  answer: A dedicated namespace isolates ArgoCD components, RBAC, Secrets, and network policies from application
    workloads. It also makes upgrades, backups, and troubleshooting cleaner.
- question: How do you get the initial ArgoCD admin password?
  answer: By default the initial admin password is stored in a Kubernetes Secret created during installation. Many
    teams use it only once, then rotate it or disable the admin account in favor of SSO.
- question: Why should the ArgoCD admin account usually be disabled later?
  answer: The built-in admin account is convenient for bootstrap but weakens accountability if used long term. Disabling
    it forces users through SSO, where access is tied to identity provider groups and audit trails are clearer.
- question: How do you expose the ArgoCD UI securely?
  answer: The UI is usually exposed through an Ingress, load balancer, or API gateway with TLS enabled. Access should
    be protected with SSO, network controls, and ideally IP restrictions or VPN access for internal platforms.
- question: Why is the ArgoCD external URL important?
  answer: The configured external URL is used for callbacks, CLI behavior, and links generated by ArgoCD. If it
    is wrong, login flows and notifications can behave strangely in wonderfully annoying ways.
- question: What configuration is stored in argocd-cm?
  answer: argocd-cm stores core ArgoCD settings such as repository behavior, UI options, diff customizations, resource
    tracking settings, health scripts, and tool configuration. It is one of the main configuration surfaces in ArgoCD.
- question: What configuration is stored in argocd-rbac-cm?
  answer: argocd-rbac-cm stores RBAC policies, role definitions, and the default access policy. These policies determine
    who can view, sync, update, or administer applications and projects.
- question: What is stored in argocd-secret?
  answer: argocd-secret stores sensitive configuration such as local user passwords, server secrets, OAuth client
    secrets, repository credentials, and signing material depending on the setup. It should be treated like any
    other high-value secret.
- question: What are repository credential templates in ArgoCD?
  answer: Repository credential templates let you define reusable credentials that match repositories by URL prefix.
    This is useful when many repos share the same authentication method and you want to avoid duplicate secret definitions.
- question: Can ArgoCD be configured declaratively?
  answer: Yes. Projects, repositories, clusters, RBAC, Applications, and many global settings can be managed through
    Git and applied declaratively, which is the preferred model for reproducibility and recovery.
- question: What should you back up in an ArgoCD environment?
  answer: You should back up ArgoCD custom resources, important ConfigMaps, Secrets, cluster registration details,
    and the Git repositories that define applications. If Git and ArgoCD configuration are fully declarative, recovery
    is much simpler.
- question: What is the safest way to upgrade ArgoCD?
  answer: Upgrades should follow release notes carefully, especially for CRD changes, deprecated settings, and controller
    behavior changes. Test in a non-production environment first, back up critical resources, and watch the health
    of repo-server and controller components during rollout.
- question: Why do ArgoCD CRDs matter during upgrades?
  answer: ArgoCD relies on CRDs such as Application and ApplicationSet. If CRDs are outdated relative to the controller
    version, features may fail or fields may not validate correctly.
- question: What is the difference between application sync status and health status?
  answer: Sync status tells you whether the live cluster matches the desired Git state, while health status indicates
    whether the deployed resources appear operational. An application can be Synced but Degraded, or OutOfSync but
    Healthy.
- question: What does a Hard Refresh do in ArgoCD?
  answer: A hard refresh forces ArgoCD to bypass cached repository and manifest information and fully recalculate
    the application state. It is useful when normal refreshes do not reflect recent source or rendering changes.
- question: Why might you need a hard refresh instead of a normal refresh?
  answer: Cached repository artifacts or manifest generation results can occasionally mask the latest source state.
    A hard refresh forces ArgoCD to re-fetch and re-render everything so the diff is recalculated from scratch.
- question: How often does ArgoCD reconcile applications?
  answer: ArgoCD continuously watches resources and also refreshes state on configured intervals. The exact behavior
    depends on cache settings, webhooks, source refresh timing, and whether manual or automated sync is enabled.
- question: What is repoURL in an ArgoCD Application?
  answer: repoURL identifies the Git repository, Helm repository, or OCI registry source for the application. It
    is the starting point ArgoCD uses to fetch the desired configuration.
- question: What is targetRevision in an ArgoCD Application?
  answer: targetRevision defines what version of the source should be deployed, such as a Git branch, tag, commit
    SHA, or chart version. It controls which exact content ArgoCD renders.
- question: What is the path field in an ArgoCD Application?
  answer: path tells ArgoCD which directory inside a Git repository contains the manifests, chart, or Kustomize
    overlay for that application. It is not used for pure remote Helm chart sources.
- question: What is the destination field in an ArgoCD Application?
  answer: destination identifies where the application should be deployed, including the target cluster and namespace.
    This is how one ArgoCD instance can manage many environments.
- question: What is the difference between destination.name and destination.server?
  answer: destination.server points directly to a cluster API URL, while destination.name references a cluster that
    ArgoCD already knows by name. Using names is often cleaner in multi-cluster environments.
- question: What source types can ArgoCD deploy?
  answer: ArgoCD supports plain YAML directories, Helm charts, Kustomize, Jsonnet, custom config management plugins,
    and OCI sources for some artifact types. It focuses on manifest generation rather than image building.
- question: What are multiple sources in ArgoCD Applications?
  answer: Multiple sources let one Application combine manifests from more than one source definition. This is useful
    when, for example, a Helm chart comes from one location while values files or patches come from another repository.
- question: Why would you use multiple sources in ArgoCD?
  answer: Multiple sources help separate reusable vendor content from environment-specific configuration. They reduce
    duplication while keeping local overrides in repositories your team controls.
- question: How does ArgoCD handle Helm values precedence?
  answer: Helm values in ArgoCD follow Helm's normal precedence model, where later or more specific settings override
    earlier defaults. Inline parameters and value files can override chart defaults depending on how the source
    is defined.
- question: What are Helm value files in ArgoCD used for?
  answer: Value files let you keep environment-specific chart settings in version-controlled YAML. ArgoCD passes
    them during rendering so the generated manifests reflect the intended environment configuration.
- question: What are Helm parameters in ArgoCD?
  answer: Helm parameters are explicit key-value overrides passed to chart rendering, similar to --set in Helm CLI.
    They are useful for small overrides but can become messy compared to value files when configuration grows.
- question: When should you prefer Helm value files over many inline parameters?
  answer: Value files are better for readability, code review, and repeatability because they keep configuration
    structured. Large sets of inline parameters quickly become hard to understand and maintain.
- question: What is helm.releaseName in ArgoCD?
  answer: helm.releaseName sets the Helm release name used during chart rendering. It matters when charts generate
    names or labels based on the release name and you want deterministic resource naming.
- question: Can ArgoCD deploy a chart directly from a Helm repository?
  answer: Yes. An Application can point at a Helm repository and chart version instead of a Git path. ArgoCD renders
    the chart and manages the resulting Kubernetes resources itself.
- question: Can ArgoCD deploy a chart stored inside Git?
  answer: Yes. If a chart lives in a Git repo, ArgoCD can use that directory as the source path and render it directly.
    This is common when teams version charts alongside app configuration.
- question: How does ArgoCD detect a Kustomize application?
  answer: ArgoCD detects Kustomize when a kustomization.yaml file exists in the source path. It then runs Kustomize
    build and compares the rendered output with the cluster.
- question: What Kustomize-specific settings can ArgoCD override?
  answer: ArgoCD can override images, replicas, common labels, name prefixes, and some build options depending on
    the version and configuration. This is helpful for environment customization without rewriting bases.
- question: What is directory.recurse in ArgoCD?
  answer: directory.recurse tells ArgoCD to recursively scan subdirectories for plain manifest files. It is useful
    when a source tree has nested directories rather than one flat manifest folder.
- question: What are directory include and exclude patterns in ArgoCD?
  answer: Include and exclude patterns control which files are considered during directory rendering. They help
    avoid pulling in unrelated YAML, test data, or documents that happen to live beside manifests.
- question: How does ArgoCD support Jsonnet?
  answer: ArgoCD can run Jsonnet to render manifests from source files and optional extVars or tlas. This is useful
    for teams that want programmable manifest generation while still using GitOps reconciliation.
- question: What are config management plugins in ArgoCD?
  answer: Config management plugins let ArgoCD use external tools or custom scripts to generate manifests. They
    are powerful but should be controlled carefully because they extend the trusted execution surface of repo-server.
- question: What is the sidecar plugin model in ArgoCD?
  answer: In the sidecar plugin model, a companion container provides the plugin runtime alongside repo-server.
    This helps isolate custom tooling and makes plugin packaging more predictable than baking everything into one
    image.
- question: Why should config management plugins be used cautiously?
  answer: Plugins can execute arbitrary tooling against repository content, so they increase security and operational
    risk. They should be versioned, reviewed, and tightly controlled just like any build or deployment extension.
- question: Does ArgoCD support OCI artifacts?
  answer: Yes, ArgoCD supports OCI-based artifact workflows for certain source types, especially Helm charts stored
    in OCI registries. OCI can simplify artifact distribution and integrate well with modern registry tooling.
- question: How do you authenticate ArgoCD to private Git repositories?
  answer: ArgoCD supports SSH keys, HTTPS credentials, tokens, GitHub App credentials, and repository credential
    templates. The best option depends on your provider and how centrally you want to manage access.
- question: How do you authenticate ArgoCD to private Helm repositories?
  answer: Private Helm repositories are usually configured with basic auth, tokens, or OCI registry credentials
    stored as repository secrets. ArgoCD uses those credentials during chart fetch and rendering.
- question: Should targetRevision point to a branch or a commit SHA?
  answer: A branch is convenient for continuous environments, but a commit SHA gives maximum immutability and auditability.
    Production systems often prefer pinned revisions for tighter change control.
- question: Why is pinning to a commit SHA attractive for production?
  answer: A commit SHA is immutable, so you know exactly what source was deployed. That makes rollbacks, auditing,
    and incident analysis far more deterministic.
- question: What is the Application project field used for?
  answer: The project field assigns an application to an ArgoCD Project, which controls allowed repositories, destinations,
    and resource permissions. It is a primary multi-tenancy and guardrail mechanism.
- question: What is syncPolicy in an Application spec?
  answer: syncPolicy defines how ArgoCD handles synchronization, including whether sync is automated and what sync
    options are enabled. It controls the behavior of reconciliation beyond simple diffing.
- question: What does automated syncPolicy mean in practice?
  answer: It means ArgoCD is allowed to sync without a person clicking the button every time. Depending on options,
    it may also self-heal drift and prune deleted resources automatically.
- question: What is sync retry in ArgoCD?
  answer: Sync retry defines how ArgoCD retries failed operations with configurable limits and backoff. It is useful
    for transient failures such as API contention or dependency timing issues.
- question: What problem does CreateNamespace=true solve?
  answer: CreateNamespace=true lets ArgoCD create the destination namespace during sync if it does not already exist.
    This reduces bootstrap friction for new applications and environments.
- question: What is managedNamespaceMetadata in ArgoCD?
  answer: managedNamespaceMetadata lets ArgoCD manage labels and annotations on a namespace it creates. This is
    helpful for attaching ownership, cost, security, or platform metadata during bootstrap.
- question: What is selective sync in ArgoCD?
  answer: Selective sync allows syncing only a subset of resources in an application rather than the entire manifest
    set. It is useful for debugging or controlled operations, but it should not become a permanent workflow habit.
- question: What is a sync window in ArgoCD?
  answer: Sync windows define time-based rules for when applications may or may not sync. They are often used to
    block automated changes during freeze periods or allow them only during approved release windows.
- question: What is ServerSideApply in ArgoCD sync options?
  answer: ServerSideApply tells ArgoCD to use Kubernetes server-side apply instead of client-side apply. It can
    improve field ownership behavior and reduce issues with large manifests or managed fields.
- question: When is ServerSideApply useful in ArgoCD?
  answer: It is useful when resources are large, frequently mutated by controllers, or when you want Kubernetes-managed
    field ownership semantics. It can also help with some annotation size limits that affect client-side apply.
- question: What does Replace=true do in ArgoCD?
  answer: Replace=true instructs ArgoCD to use kubectl replace or create rather than apply for certain resources.
    It is a blunt tool that can help with some immutable or patch-related issues, but it may be more disruptive.
- question: What does Force=true mean in ArgoCD sync options?
  answer: Force=true can cause resources to be recreated when necessary, often used with Jobs or immutable field
    changes. It should be used carefully because recreation can create downtime or unexpected side effects.
- question: What is PruneLast=true?
  answer: PruneLast=true delays resource deletion until apply operations have completed. This can reduce dependency
    issues when old resources should be removed only after replacements are already in place.
- question: What is PrunePropagationPolicy in ArgoCD?
  answer: PrunePropagationPolicy controls how Kubernetes garbage collection handles dependent resources when ArgoCD
    prunes an object. Typical modes include foreground, background, and orphan depending on deletion behavior needs.
- question: What does ApplyOutOfSyncOnly=true do?
  answer: It tells ArgoCD to apply only resources that are actually out of sync rather than reapplying everything.
    This can reduce unnecessary API traffic in large applications.
- question: What does RespectIgnoreDifferences=true do?
  answer: It makes sync behavior honor ignoreDifferences settings during apply decisions as well as diff views.
    That helps avoid unnecessary reconciliations on fields you intentionally chose to ignore.
- question: What problem does SkipDryRunOnMissingResource=true solve?
  answer: It allows sync to continue when dry-run validation would fail because a CRD is not installed yet. This
    is useful when ArgoCD is creating both the CRD and its custom resources in the same sync sequence.
- question: What does Validate=false mean in sync options?
  answer: Validate=false disables schema validation during apply operations for cases where validation would incorrectly
    fail. It should be used sparingly because validation exists for a reason and bugs love unguarded doors.
- question: What does FailOnSharedResource=true do?
  answer: It causes sync to fail if ArgoCD detects a resource already managed by another application. This helps
    prevent accidental overlap and resource ownership conflicts.
- question: What are sync waves used for beyond initial ordering?
  answer: Sync waves are useful whenever resources have dependencies, such as namespaces before workloads, CRDs
    before custom resources, or config objects before deployments. They add explicit orchestration to otherwise
    declarative syncs.
- question: Can sync waves use negative numbers?
  answer: Yes, negative wave numbers are valid and are often used to ensure prerequisites run before default-wave
    resources. This is handy for CRDs, namespaces, or early bootstrap hooks.
- question: What is the difference between hooks and waves in ArgoCD?
  answer: Waves control ordering of normal resources, while hooks define special resources that run at lifecycle
    phases such as PreSync or PostSync. Hooks are about phase semantics; waves are about ordering.
- question: What is Hook Delete Policy in ArgoCD?
  answer: Hook delete policy controls whether hook resources are removed before creation, after success, or after
    failure. This keeps Jobs and other hook resources from piling up like forgotten coffee mugs in the cluster.
- question: What is the Skip hook?
  answer: A Skip hook annotation tells ArgoCD not to apply a given manifest during normal sync. It is occasionally
    useful for templates that should exist in the repo but not be managed in a specific sync path.
- question: What is a PostDelete hook in ArgoCD?
  answer: A PostDelete hook runs after application deletion to perform cleanup tasks. It is useful for external
    cleanup steps that Kubernetes garbage collection alone will not handle.
- question: How do you customize health checks for custom resources in ArgoCD?
  answer: Custom health checks are defined with Lua scripts in ArgoCD configuration. These scripts inspect custom
    resource status fields and return health states such as Healthy, Degraded, or Progressing.
- question: Why are custom health checks important for CRDs?
  answer: Without them, ArgoCD may report custom resources as Unknown even when they are functioning correctly.
    Custom checks let platform teams express what “healthy” means for their own operators and controllers.
- question: What is ignoreDifferences in ArgoCD?
  answer: ignoreDifferences tells ArgoCD to ignore specific fields or paths when diffing desired and live resources.
    It is commonly used for fields mutated by controllers, admission webhooks, or the Kubernetes API itself.
