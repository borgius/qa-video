  name: "CPA FAR: Accounting & Financial Reporting — Frameworks and Statements"
  description: Financial reporting frameworks, core statements, consolidations, not-for-profit reporting, governmental
    accounting, SEC reporting, special-purpose frameworks, and high-yield ratios for CPA FAR and BAR prep.
  questionDelay: 1
  answerDelay: 1
