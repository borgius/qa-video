questions:
  - question: What financial reporting frameworks should a CPA candidate know for FAR and BAR?
    answer: >-
      The core framework is **U.S. GAAP**, established primarily by the FASB for nongovernmental entities. You should
      also know **GASB standards** for state and local governmental entities, **SEC reporting rules** for public
      companies, and **special-purpose frameworks** such as the cash basis, tax basis, regulatory basis, and contractual
      basis.


      For the exam, always identify **which framework applies first**, because recognition, measurement, presentation,
      and disclosure can change depending on the reporting basis.
  - question: What are the primary financial statements under U.S. GAAP for a for-profit entity?
    answer: >-
      The primary financial statements are:


      - **Balance sheet / statement of financial position** — reports assets, liabilities, and equity at a point in time

      - **Income statement** — reports revenues, expenses, gains, and losses over a period

      - **Statement of comprehensive income** — reports net income plus other comprehensive income items

      - **Statement of changes in equity** — reconciles beginning and ending equity balances

      - **Statement of cash flows** — reports cash receipts and cash payments classified as operating, investing, and
      financing

      - **Notes to the financial statements** — provide required details, accounting policies, commitments,
      contingencies, and other explanations


      On FAR, remember that the notes are considered an integral part of the financial statements.
  - question: What is the purpose of a balance sheet?
    answer: >-
      The balance sheet shows an entity's **financial position at a specific date**. It presents:


      - **Assets** — probable future economic benefits obtained or controlled by the entity

      - **Liabilities** — probable future sacrifices of economic benefits arising from present obligations

      - **Equity** — residual interest in assets after deducting liabilities


      The balance sheet helps users evaluate liquidity, solvency, capital structure, and resource composition.
      High-yield exam point: the basic equation is **Assets = Liabilities + Equity**.
  - question: What is the difference between a single-step and a multi-step income statement?
    answer: >-
      A **single-step income statement** groups all revenues and gains together, then subtracts all expenses and losses
      to arrive at income before tax and then net income. It is simple but provides less detail.


      A **multi-step income statement** separates operating from nonoperating items and highlights subtotals such as:


      - gross profit

      - operating income

      - income before tax

      - net income


      FAR frequently tests classification. For example, interest revenue and interest expense are usually
      **nonoperating** for most nonfinancial companies.
  - question: What is comprehensive income and what items usually appear in OCI?
    answer: |-
      **Comprehensive income** equals all changes in equity during a period from nonowner sources. It includes:

      - **Net income**
      - **Other comprehensive income (OCI)**

      Common OCI items include:

      - certain unrealized gains and losses on debt securities classified as fair value through OCI
      - foreign currency translation adjustments
      - some pension-related adjustments
      - gains and losses on cash flow hedges, to the extent effective

      CPA tip: OCI bypasses the income statement initially, but accumulated OCI is reported in equity.
  - question: How is the statement of cash flows organized under the indirect method?
    answer: >-
      The statement of cash flows has three sections:


      - **Operating activities**

      - **Investing activities**

      - **Financing activities**


      Under the **indirect method**, operating cash flow starts with **net income** and adjusts for:


      - noncash items such as depreciation, amortization, and impairment

      - gains and losses included in net income that belong in investing or financing sections

      - changes in operating working capital accounts such as receivables, inventory, payables, and accrued expenses


      A classic exam rule: **increase in an operating asset is subtracted**, while **increase in an operating liability
      is added**.
  - question: What are common classifications in the statement of cash flows that CPA candidates confuse?
    answer: >-
      Common trouble spots include:


      - **Purchase or sale of PPE and investments** → investing activities

      - **Borrowing and repayment of principal** → financing activities

      - **Issuance of stock and treasury stock transactions** → financing activities

      - **Interest paid and interest received under U.S. GAAP** → operating activities

      - **Dividends received** → operating activities

      - **Dividends paid** → financing activities


      Another key point: significant **noncash investing and financing activities** are disclosed separately, not in the
      main body of the cash flow statement.
  - question: What is the general approach to preparing adjusting entries at period end?
    answer: >-
      Adjusting entries are made to apply the **accrual basis** and proper **matching / period recognition**. Common
      categories are:


      - accrued revenues

      - accrued expenses

      - deferred revenues

      - prepaid expenses

      - estimates such as bad debt expense, depreciation, amortization, and warranty expense


      The goal is to ensure revenues are recognized when earned and expenses when incurred, regardless of cash timing.
      Many FAR simulations test whether you can identify the needed adjustment and its effect on statements.
  - question: How are consolidated financial statements prepared when one company controls another?
    answer: >-
      Consolidated financial statements present the parent and subsidiary as **one economic entity**. The process
      generally includes:


      - combining like assets, liabilities, revenues, and expenses line by line

      - eliminating the parent's investment account against the subsidiary's equity accounts

      - eliminating intercompany balances and transactions

      - recognizing and presenting any **noncontrolling interest (NCI)**


      The exam loves eliminations. Intercompany sales, receivables/payables, notes, dividends, and unrealized profit in
      ending inventory often must be removed from consolidated amounts.
  - question: What is noncontrolling interest and where is it reported?
    answer: >-
      **Noncontrolling interest (NCI)** is the portion of a subsidiary's net assets and earnings attributable to owners
      other than the parent. In consolidated financial statements:


      - NCI is reported in **equity**, separate from the parent shareholders' equity

      - net income is allocated between the **parent** and **noncontrolling interest**


      Even when the parent owns less than 100% of the subsidiary, the consolidated statements still include **100% of
      the subsidiary's assets and liabilities**, with NCI reflecting the outside ownership interest.
  - question: Why are intercompany transactions eliminated in consolidation?
    answer: >-
      Intercompany transactions are eliminated because consolidated statements must report only results from
      transactions with **outside parties**. If the parent sells inventory to the subsidiary, the consolidated entity
      has not yet earned profit from that transaction until the inventory is sold externally.


      Common eliminations include:


      - intercompany receivables and payables

      - intercompany notes and interest

      - intercompany sales and purchases

      - intercompany dividends

      - unrealized intercompany profit in ending inventory or fixed assets
  - question: What are the key financial statements for not-for-profit organizations?
    answer: >-
      Not-for-profit entities generally present:


      - **Statement of financial position**

      - **Statement of activities**

      - **Statement of cash flows**

      - **Statement of functional expenses** for certain organizations, especially voluntary health and welfare entities


      Their net assets are classified into:


      - **without donor restrictions**

      - **with donor restrictions**


      CPA tip: restricted support is not the same thing as deferred revenue. Contributions are usually recognized when
      promised if unconditional.
  - question: How are contributions accounted for by not-for-profit organizations?
    answer: >-
      Contributions are generally recognized as revenue when received or unconditionally promised. The key distinction
      is whether the contribution is:


      - **with donor restrictions**

      - **without donor restrictions**


      If a restriction expires by time or purpose satisfaction, the amount is reclassified from net assets with donor
      restrictions to net assets without donor restrictions.


      Conditional promises to give are **not recognized** until the condition is substantially met.
  - question: What is the basic structure of governmental accounting for state and local governments?
    answer: |-
      Governmental accounting uses both **government-wide statements** and **fund statements**.

      - **Government-wide statements** use the economic resources measurement focus and accrual basis.
      - **Fund statements** vary by fund type.

      Major fund categories are:

      - **Governmental funds**
      - **Proprietary funds**
      - **Fiduciary funds**

      FAR frequently tests the ability to identify which statements and basis of accounting apply to each category.
  - question: What measurement focus and basis of accounting are used by governmental funds?
    answer: >-
      Governmental funds use the **current financial resources measurement focus** and the **modified accrual basis**.
      This means they focus on spendable financial resources rather than overall economic resources.


      Key rules:


      - revenues are recognized when they are **measurable and available**

      - expenditures are generally recognized when the related liability is incurred, subject to certain exceptions


      They do **not** report long-term assets and long-term liabilities in the fund statements.
  - question: What statements are presented for governmental funds, proprietary funds, and fiduciary funds?
    answer: >-
      **Governmental funds** present:


      - balance sheet

      - statement of revenues, expenditures, and changes in fund balances


      **Proprietary funds** present:


      - statement of net position

      - statement of revenues, expenses, and changes in net position

      - statement of cash flows


      **Fiduciary funds** present fiduciary net position and changes in fiduciary net position. Government-wide
      statements do **not** include fiduciary activities because those resources are not available to support the
      government's own programs.
  - question: What is fund balance classification in governmental funds?
    answer: >-
      Governmental fund balance is classified as:


      - **Nonspendable**

      - **Restricted**

      - **Committed**

      - **Assigned**

      - **Unassigned**


      The exam may test the hierarchy of constraints. Restricted amounts are constrained by external parties or law,
      committed amounts by formal government action, and assigned amounts by intended use. **Unassigned** is the
      residual classification, typically in the general fund.
  - question: What SEC filings should a CPA candidate know for public company reporting?
    answer: >-
      The big three are:


      - **Form 10-K** — annual report

      - **Form 10-Q** — quarterly report

      - **Form 8-K** — current report for significant events


      CPA candidates should understand their general purpose, timing, and the fact that public company reporting often
      involves additional disclosures, interim reporting considerations, and SEC-specific presentation rules beyond base
      GAAP.
  - question: How do you compute basic earnings per share?
    answer: >-
      **Basic EPS** is:


      **Net income available to common shareholders ÷ weighted-average common shares outstanding**


      To get net income available to common shareholders, subtract **preferred dividends** from net income when
      preferred stock is outstanding.


      The denominator uses **weighted-average shares**, so stock issuances, repurchases, stock dividends, and stock
      splits affect the share count based on timing. Stock splits and stock dividends are applied retroactively to all
      periods presented.
  - question: What is diluted EPS and when are potential common shares included?
    answer: >-
      **Diluted EPS** reflects the effect of securities that could dilute common shareholders, such as options,
      warrants, convertible debt, and convertible preferred stock.


      Include potential common shares only if they are **dilutive**, meaning they reduce EPS or increase loss per share.
      Antidilutive securities are excluded.


      Two classic methods:


      - **Treasury stock method** for options and warrants

      - **If-converted method** for convertible securities
  - question: What is XBRL and why is it relevant to CPA candidates?
    answer: >-
      **XBRL** stands for eXtensible Business Reporting Language. It is used by public companies to tag financial data
      in a standardized, machine-readable format for SEC filings.


      From an exam perspective, know the general purpose:


      - improves comparability and electronic analysis

      - allows users and regulators to extract tagged financial data efficiently

      - supports transparent digital reporting


      You usually won't need deep technical tagging mechanics, but you should know why it exists.
  - question: What are special-purpose frameworks and when are they used?
    answer: >-
      Special-purpose frameworks are alternative bases of accounting other than full GAAP. Common examples are:


      - **cash basis**

      - **tax basis**

      - **regulatory basis**

      - **contractual basis**


      They are often used when users' needs are narrower and do not require full GAAP financial statements. For the CPA
      exam, understand that statements under these frameworks can look similar to GAAP statements, but recognition and
      measurement rules differ.
  - question: Which ratios and metrics are most important to know in financial reporting analysis?
    answer: |-
      High-yield ratios include:

      - **Current ratio = current assets ÷ current liabilities**
      - **Quick ratio = (cash + short-term investments + net receivables) ÷ current liabilities**
      - **Gross profit margin = gross profit ÷ net sales**
      - **Net profit margin = net income ÷ net sales**
      - **Return on assets = net income ÷ average total assets**
      - **Return on equity = net income ÷ average equity**
      - **Debt-to-equity = total liabilities ÷ total equity**
      - **Inventory turnover = cost of goods sold ÷ average inventory**
      - **Receivables turnover = net credit sales ÷ average net receivables**

      FAR questions often test not just the formula, but also the **directional impact** of transactions on the ratio.
  - question: What is the conceptual framework and how does it guide financial reporting?
    answer: >-
      The FASB **Conceptual Framework** establishes the objectives and concepts underlying financial reporting. The
      primary objective is to provide decision-useful information to existing and potential investors, lenders, and
      creditors.


      The two fundamental qualitative characteristics are **relevance** (including predictive and confirmatory value,
      and materiality) and **faithful representation** (complete, neutral, free from error). Enhancing characteristics
      include comparability, verifiability, timeliness, and understandability.
  - question: What is the going concern assumption and how does it affect financial statement preparation?
    answer: >-
      The **going concern assumption** holds that an entity will continue operating, meet its obligations, and not be
      forced to liquidate in the foreseeable future. Financial statements are prepared on this basis unless the
      assumption is not appropriate.


      Under ASC 205-40, management must evaluate going concern for each reporting period. If substantial doubt exists,
      management must consider whether its plans can alleviate that doubt and provide **disclosures** (or, if doubt is
      not alleviated, disclose the conditions and plans in the notes).
  - question: What is the accrual basis of accounting and how does it differ from cash basis?
    answer: >-
      Under **accrual accounting**, revenues are recognized when earned and expenses when incurred, regardless of when
      cash is received or paid. This aligns costs and benefits within the same period (matching principle).


      Under **cash basis**, revenues and expenses are recognized when cash is received or paid. Cash basis may be used
      by very small entities and certain tax reporting contexts but does not conform to GAAP for general-purpose
      financial statements.
  - question: What is the matching principle and where does it apply in financial reporting?
    answer: >-
      The **matching principle** (part of the expense recognition principle) requires that expenses be recognized in the
      same period as the revenues they help generate. This is why depreciation, cost of goods sold, and warranty expense
      are tied to the related revenue-generating activities.


      For expenses not directly associated with revenue (period costs such as administrative salaries and rent), they
      are expensed in the period incurred. The matching principle is a core GAAP concept tested in adjusting entry and
      income statement questions.
  - question: What are the key types of adjusting journal entries and why are they necessary?
    answer: |-
      Adjusting entries ensure proper accrual-basis reporting at period-end. The four types are:
      1. **Accrued revenues**: Revenue earned but not yet billed/received.
      2. **Accrued expenses**: Expenses incurred but not yet paid/recorded.
      3. **Deferred revenues**: Cash received before revenue is earned; the liability is reduced as earned.
      4. **Deferred expenses (prepaid)**: Cash paid in advance; expense is recognized as benefits are consumed.

      Without adjusting entries, financial statements would violate accrual accounting.
  - question: What is a trial balance and how is it used in the accounting cycle?
    answer: >-
      A **trial balance** is a listing of all ledger accounts with their debit or credit balances. It is used to verify
      that total debits equal total credits after posting journal entries.


      The accounting cycle typically proceeds: analyze transactions → journalize → post to ledger → prepare trial
      balance → record adjusting entries → prepare adjusted trial balance → prepare financial statements → record
      closing entries → prepare post-closing trial balance. FAR may test the sequence or test transactional effects on
      specific accounts.
  - question: What are closing entries and what accounts are closed at year-end?
    answer: >-
      **Closing entries** transfer the balances of temporary accounts (revenues, expenses, gains, losses, and dividends
      declared) to retained earnings:

      1. Debit each revenue account; Credit Income Summary (or directly Retained Earnings).

      2. Credit each expense account; Debit Income Summary.

      3. Close Income Summary to Retained Earnings (the net income or loss).

      4. Debit Retained Earnings (or Dividends Declared) for dividends declared.


      Permanent accounts (assets, liabilities, equity) are **not closed**; their balances carry forward.
  - question: What is the difference between operating and nonoperating items on the income statement?
    answer: >-
      **Operating items** relate to the entity's primary revenue-generating activities: sales revenue, cost of goods
      sold, selling expenses, and general/administrative expenses (income from operations).


      **Nonoperating items** are peripheral gains/losses and income/expenses not central to ongoing operations: interest
      income, interest expense, gains/losses on investments or asset disposals, and dividend income. On a multi-step
      income statement, these appear below "Income from operations." For manufacturing and retail companies, interest
      expense is a classic nonoperating item.
  - question: How is discontinued operations reported on the income statement?
    answer: >-
      A **discontinued operation** involves a separately identifiable component (segment, operating unit) that has been
      disposed of or classified as held-for-sale. It is reported as a **single line item** below continuing operations
      on the income statement: "Income (loss) from discontinued operations, net of tax."


      This includes: results of operations during the phase-out period, and any gain or loss on disposal. Prior periods
      are restated to present the discontinued component separately, providing comparability of continuing operations.
  - question: What is extraordinary items treatment under current U.S. GAAP?
    answer: >-
      The concept of **extraordinary items** was **eliminated** by ASU 2015-01. Prior to 2015, extraordinary items were
      unusual and infrequent events reported separately (net of tax) below income from continuing operations.


      Now, unusual and/or infrequent items are presented as a **separate component of income from continuing
      operations** (pre-tax), but there is no longer a special "extraordinary" classification. FAR candidates may
      encounter old exam questions referencing extraordinary items; know they are no longer reported separately.
  - question: What is other comprehensive income (OCI) and how is it presented?
    answer: >-
      **Other comprehensive income (OCI)** consists of revenues, expenses, gains, and losses excluded from net income
      but included in comprehensive income:

      - Unrealized gains/losses on AFS debt securities

      - Effective portion of cash flow hedge gains/losses

      - Foreign currency translation adjustments

      - Pension/OPEB funded status adjustments (prior service cost, actuarial gains/losses)


      OCI is reported in a **statement of comprehensive income** — either as a second section below net income in a
      single statement, or in a separate statement immediately following the income statement.
  - question: How does the indirect method of the statement of cash flows work?
    answer: >-
      Under the **indirect method**, operating cash flows start with **net income** and adjust for:

      1. Non-cash items (add back depreciation/amortization, subtract gains on asset sales, add losses).

      2. Changes in working capital (e.g., increase in receivables is a use of cash; increase in payables is a source).


      The result is net cash from operating activities. Investing and financing activities are presented the same
      regardless of direct or indirect method. The indirect method is preferred by most companies; the FASB recommends
      the direct method but permits indirect.
  - question: What is the direct method for operating cash flows and how does it differ from indirect?
    answer: >-
      The **direct method** presents each major class of gross receipts and payments:

      - Cash received from customers

      - Cash paid to suppliers

      - Cash paid for salaries, interest, taxes, etc.


      The result is the same total operating cash flow as the indirect method, but the presentation is more transparent.
      Under the direct method, a reconciliation of net income to operating cash flows must also be provided (essentially
      the indirect schedule). The exam may ask you to compute single line items under the direct method.
  - question: How are investing activities classified in the statement of cash flows?
    answer: >-
      **Investing activities** include:

      - Purchases and sales/maturities of PP&E and other long-term assets

      - Purchases and proceeds from investments (debt and equity securities not classified as cash equivalents)

      - Loans made to others and principal collections on those loans

      - Acquisitions of businesses (net of cash acquired)


      Capital expenditures (purchases of PP&E) are typically the largest investing outflow for a capital-intensive firm.
      Proceeds from selling long-term assets are investing inflows.
  - question: How are financing activities classified in the statement of cash flows?
    answer: >-
      **Financing activities** include:

      - Issuance and repayment of long-term debt (bonds, notes, mortgages)

      - Issuance and repurchase of equity (stock issuance proceeds, treasury stock purchases)

      - Payment of dividends (dividends **paid** are financing; dividends received may be operating or investing)

      - Proceeds from short-term borrowings and repayments


      Note: interest paid is generally classified as **operating** under U.S. GAAP (unlike IFRS where it may be
      financing). Dividends paid are **financing**; dividends received and interest received are **operating**.
  - question: How are noncash investing and financing activities disclosed?
    answer: >-
      **Noncash investing and financing activities** (e.g., acquiring an asset by issuing stock, converting debt to
      equity, capital leases entered into, acquiring property through a mortgage directly) must be disclosed in a
      **supplemental schedule** to the statement of cash flows.


      They are excluded from the body of the cash flow statement because no cash changes hands, but they are significant
      enough to warrant disclosure since they affect future cash flows and capital structure.
  - question: How is a consolidated balance sheet prepared when one entity acquires another?
    answer: >-
      At consolidation, the parent's investment account and the subsidiary's equity are **eliminated**. The subsidiary's
      assets and liabilities are combined with the parent's at their **acquisition-date fair values**. Any excess of
      cost over fair value of net assets = goodwill.


      **Intercompany balances** (loans, receivables/payables between entities) are eliminated. Noncontrolling interest
      is measured at fair value (or proportionate share of net assets, per policy) and reported in equity.
  - question: What is a variable interest entity (VIE) and how does it affect consolidation?
    answer: >-
      A **VIE** is an entity for which the traditional voting interest model does not work because the equity investors
      lack sufficient equity at risk or lack the characteristics of a controlling financial interest.


      The **primary beneficiary** — the entity that has power over the VIE's most significant activities and benefits
      most from residual returns (or absorbs expected losses) — must consolidate the VIE. This is tested when companies
      create special-purpose vehicles for securitizations, operating leases, or R&D funding.
  - question: How is noncontrolling interest (NCI) measured and presented?
    answer: >-
      Under ASC 810, **NCI** represents the equity interest in a subsidiary not owned by the parent. It is measured at
      **acquisition-date fair value** (full goodwill method) or, as a policy choice, at the proportionate share of net
      identifiable assets.


      NCI is presented as a **separate component of equity** in consolidated equity (not a liability or a mezzanine
      item). In the consolidated income statement, net income is attributed to both the parent and NCI.
  - question: How are intercompany sales and profits eliminated in consolidation?
    answer: >-
      All **intercompany transactions** must be eliminated in preparing consolidated statements. For intercompany
      inventory sales:

      - Eliminate the intercompany sale and cost of goods sold.

      - Eliminate any **unrealized profit** still in ending inventory (the buyer has not yet sold to outsiders).


      The unrealized intercompany profit is removed from inventory and from the selling affiliate's income. If the
      intercompany sale was downstream (parent to sub), the elimination is entirely against the parent's income; if
      upstream (sub to parent), the NCI share is also reduced.
  - question: What is the push-down accounting option under ASC 805?
    answer: >-
      **Push-down accounting** is an option (not required under ASC 805-50) that allows a newly acquired subsidiary to
      restate its own separate financial statements to reflect the fair values assigned in the business combination. The
      subsidiary "pushes down" the acquisition accounting to its own books.


      This is optional for private companies and controlled entities where 100% of equity is acquired. It results in the
      subsidiary carrying goodwill and fair-valued assets on its standalone statements, simplifying consolidation for
      the subsidiary's own reporting purposes.
  - question: What are the primary financial statements required for not-for-profit organizations?
    answer: >-
      Under ASC 958, NFPs must present:

      1. **Statement of financial position** (balance sheet): assets, liabilities, and net assets.

      2. **Statement of activities**: changes in total net assets, showing revenues, expenses, gains, and losses by
         net asset class.

      3. **Statement of cash flows** (indirect or direct method).

      4. **Statement of functional expenses** (required for voluntary health and welfare organizations; optional for
         others but encouraged).


      Net assets are classified as **with donor restrictions** and **without donor restrictions** (eliminated the former
      permanently/temporarily restricted categories under ASU 2016-14).
  - question: How are contributions received by not-for-profit organizations classified?
    answer: >-
      Under ASC 958-605, contributions are recognized as **revenue** (with or without donor restrictions) when received
      (unconditional). The classification depends on donor-imposed restrictions:

      - **Without donor restrictions**: immediately available for general use.

      - **With donor restrictions**: purpose or time-restricted; released when conditions are met (reclassified to
        without restrictions via net asset release).


      Conditional contributions (dependent on a future uncertain event) are recognized only when the condition is
      substantially met.
  - question: What is the difference between governmental funds and proprietary funds?
    answer: >-
      **Governmental funds** (general, special revenue, capital projects, debt service, permanent funds) use the
      **current financial resources measurement focus** and the **modified accrual basis**. They track inflows and
      outflows of current financial resources.


      **Proprietary funds** (enterprise funds, internal service funds) use the **economic resources measurement focus**
      and the **accrual basis**, similar to for-profit accounting. They report long-term assets, liabilities, and all
      revenues and expenses.
  - question: What is the modified accrual basis of accounting used in governmental funds?
    answer: >-
      Under **modified accrual**:

      - **Revenues**: recognized when measurable and **available** to finance current period expenditures (generally
        collected within 60 days after year-end).

      - **Expenditures** (not expenses): recognized when the related liability is incurred, except for long-term debt
        principal and interest (recognized when due).


      Capital outlays and debt repayments are **expenditures** (not depreciation); assets acquired appear in
      government-wide statements, not in fund statements.
  - question: What is the government-wide statement of net position and how does it differ from fund statements?
    answer: >-
      The **government-wide statement of net position** presents the government as a whole (governmental activities +
      business-type activities) using full accrual basis and economic resources focus. It includes long-term assets
      (PP&E, infrastructure) and long-term liabilities (bonds, pensions).


      Fund statements present individual funds using modified accrual (governmental) or accrual (proprietary). A
      **reconciliation** bridges the fund balance sheet to the government-wide net position. Differences arise from
      capital assets, long-term liabilities, and internal service funds.
  - question: What are the major governmental fund types and their purposes?
    answer: >-
      1. **General Fund**: day-to-day governmental operations; only one per government.

      2. **Special Revenue Funds**: restricted revenues for specific purposes (e.g., federal grants, gas tax).

      3. **Capital Projects Funds**: acquisition/construction of major capital assets.

      4. **Debt Service Funds**: repayment of long-term debt principal and interest.

      5. **Permanent Funds**: endowment-like; only earnings (not principal) can be spent.


      A fund is reported as a **major fund** if it meets quantitative thresholds; others are combined into a nonmajor
      column.
  - question: What is a budgetary comparison schedule and why is it required for governmental entities?
    answer: >-
      Governmental entities are required to present a **budgetary comparison schedule** (or statement) for the General
      Fund and each major special revenue fund with a legally adopted annual budget. It shows:

      - Original budget

      - Final amended budget

      - Actual results (on the budgetary basis, which may differ from GAAP)


      This enables accountability — demonstrating that management complied with legally appropriated budgets. It is
      presented as **required supplementary information (RSI)** in GASB-based financial statements.
  - question: How are pensions accounted for in governmental accounting under GASB 68?
    answer: >-
      Under GASB 68, governmental employers must recognize a **net pension liability (NPL)** on the government-wide
      statement of net position equal to the plan's total pension liability minus the plan's net fiduciary position
      (assets).


      Pension expense includes service cost, interest on the liability, projected earnings on assets, and changes in
      assumptions. Differences between expected and actual experience, and assumption changes, are recognized in
      deferred outflows/inflows of resources (not OCI as under FASB).
  - question: What SEC filings should CPA candidates understand for public company reporting?
    answer: |-
      Key SEC filings:
      - **Form 10-K**: Annual report with audited financial statements, MD&A, risk factors; filed within 60–90 days
        after fiscal year-end.

      - **Form 10-Q**: Quarterly report with unaudited financial statements; filed within 40–45 days after each
        of the first three fiscal quarters.

      - **Form 8-K**: Current report for material events (earnings, acquisitions, management changes); filed within
        4 business days.

      - **Form S-1**: Registration statement for initial public offerings.
      - **Form DEF 14A (Proxy Statement)**: Shareholder meeting disclosures, executive compensation.
  - question: What is Management's Discussion and Analysis (MD&A) and what does it cover?
    answer: >-
      **MD&A** is a required section of the annual report (10-K) and quarterly report (10-Q) in which management
      discusses the company's financial condition, results of operations, and cash flows.


      It must include: comparisons of current period to prior period, known trends and uncertainties, material
      off-balance-sheet arrangements, contractual obligations, and liquidity/capital resources discussion. Unlike the
      financial statements, MD&A is **management's narrative** and is subject to SEC review but not formally audited
      (though auditors read it for inconsistencies with audited statements).
  - question: What is the purpose of segment reporting and what disclosures are required?
    answer: >-
      **Segment reporting** (ASC 280) requires disclosures about a company's **operating segments** — components for
      which discrete financial information is available and reviewed by the chief operating decision maker (CODM).


      Required disclosures include: revenues, profit/loss, assets, and capital expenditures for each reportable segment.
      A segment is reportable if it meets a 10% threshold for revenue, profit/loss, or assets. A reconciliation to
      consolidated totals must be provided.
  - question: What is basic earnings per share (EPS) and how is it calculated?
    answer: >-
      **Basic EPS** = (Net income − Preferred dividends) ÷ Weighted-average common shares outstanding.


      Preferred dividends subtracted: if cumulative, subtract the period's requirement regardless of declaration; if
      noncumulative, only declared dividends are subtracted.


      Weighted-average shares: shares are weighted by the portion of the year they are outstanding. Stock splits and
      stock dividends are applied retroactively to all periods presented.
  - question: How are diluted EPS computed and which securities are dilutive?
    answer: >-
      **Diluted EPS** = Adjusted net income ÷ (Weighted-average shares + dilutive potential shares).


      Dilutive securities include: stock options/warrants (treasury stock method), convertible debt (if-converted method
      — add back after-tax interest to numerator; add converted shares to denominator), and convertible preferred (add
      dividends back; add converted shares). A security is **antidilutive** if including it would increase EPS;
      antidilutive securities are excluded.
  - question: What is the treasury stock method used for options in diluted EPS?
    answer: >-
      Under the **treasury stock method**, options are assumed exercised at the beginning of the year (or grant date if
      later). Proceeds from hypothetical exercise are used to "repurchase" shares at the average market price. Net
      dilutive shares = shares issuable upon exercise − shares assumed repurchased.


      If the exercise price > average market price, the options are **antidilutive** and excluded from diluted EPS. Only
      options that are "in the money" on average during the period are dilutive.
  - question: How does the if-converted method work for convertible bonds in diluted EPS?
    answer: >-
      Under the **if-converted method**, convertible debt is assumed converted at the beginning of the period (or
      issuance date if later). Two adjustments:

      1. **Numerator**: Add back the after-tax interest expense avoided (interest × (1 − tax rate)).

      2. **Denominator**: Add the number of shares that would be issued upon conversion.


      If the adjusted EPS is lower than basic EPS, the convertible debt is **dilutive** and included. If conversion
      would increase EPS, exclude it as antidilutive.
  - question: What is interim financial reporting and how does it differ from annual reporting?
    answer: >-
      **Interim financial reporting** (ASC 270) treats each interim period as an integral part of the annual period, not
      a discrete stand-alone period. This means:

      - Annual costs (bonuses, repairs) may be allocated across quarters.

      - Inventory write-downs to NRV may be reversed in a later quarter if prices recover during the same annual
        period.

      - Income taxes use an **estimated annual effective tax rate** applied to year-to-date income.


      Interim reports are less comprehensive than annual reports but must include condensed financial statements.
  - question: What is a segment's quantitative threshold under ASC 280?
    answer: >-
      An operating segment is reportable if it meets **any one** of the following thresholds:

      - Its reported revenue (internal + external) ≥ **10%** of the combined revenue of all segments.

      - The absolute value of its reported profit or loss ≥ **10%** of the greater of: combined profit of profitable
        segments, or combined loss of unprofitable segments.

      - Its assets ≥ **10%** of the combined assets of all segments.


      Also, reportable segments must collectively account for ≥ **75%** of external revenues; additional segments are
      added until this threshold is reached.
  - question: How are related-party transactions disclosed in SEC filings and GAAP financials?
    answer: >-
      Under ASC 850 and SEC rules, companies must disclose the nature of related-party relationships, a description of
      transactions, and dollar amounts for each period. For SEC registrants, transactions between the company and
      directors, executive officers, 5%+ shareholders, or their family members that exceed $120,000 are disclosed in the
      proxy statement.


      Even if the terms are arm's-length, disclosure is required to allow users to assess potential conflicts of
      interest.
  - question: What is push-down accounting and when may it be applied?
    answer: >-
      **Push-down accounting** (ASC 805-50) allows an acquired entity to apply acquisition-method accounting to its own
      separate financial statements — i.e., the fair values and goodwill from the parent's purchase accounting are
      "pushed down" to the subsidiary's books.


      It is an **option** (elected per-change-in-control event). Once elected, it cannot be revoked. It simplifies
      consolidation and may provide more relevant information in the subsidiary's standalone statements. It is
      particularly relevant for wholly-owned subsidiaries that issue public debt.
  - question: What is a special-purpose framework (SPF) and give examples?
    answer: >-
      An **SPF** is a basis of accounting other than GAAP used for specific purposes:

      - **Cash basis**: revenues and expenses recognized when cash is received/paid.

      - **Modified cash basis**: cash basis with some accrual modifications (e.g., capitalizing PP&E).

      - **Income tax basis**: accounting follows federal or state tax rules.

      - **Regulatory basis**: follows insurance or utility regulators' requirements.

      - **Contractual basis**: used per a specific contract.


      SPF statements are acceptable for certain engagements (e.g., owner-managed businesses, lender agreements) but do
      not conform to GAAP.
  - question: What is the difference between U.S. GAAP and IFRS in treatment of development costs?
    answer: >-
      Under **U.S. GAAP**, research and development costs are generally **expensed** as incurred. Only direct costs of
      software development after technological feasibility are capitalized.


      Under **IFRS (IAS 38)**, research costs are expensed, but **development costs** meeting six specific criteria
      (technical feasibility, intention, ability, probable economic benefits, adequate resources, reliable measurement)
      are **capitalized** as an intangible asset and amortized. This is a high-yield GAAP vs. IFRS difference on FAR and
      BAR.
  - question: How is XBRL used in SEC financial reporting?
    answer: >-
      **XBRL (eXtensible Business Reporting Language)** is a standardized electronic tagging format for financial data.
      SEC registrants are required to tag their financial statement filings using XBRL so that the data is
      machine-readable and comparable across companies.


      For CPA candidates, XBRL improves data accessibility for investors and regulators, supports automated analysis,
      and is the backbone of the SEC's **EDGAR** interactive data viewer. Inline XBRL (iXBRL) embeds tags directly in
      the HTML filing.
  - question: What is the full disclosure principle and materiality?
    answer: >-
      The **full disclosure principle** requires that financial statements include all information necessary to prevent
      them from being misleading to a reasonable user. Disclosure is achieved through the financial statements, notes,
      and supplementary schedules.


      **Materiality**: An item is material if there is a substantial likelihood that a reasonable investor would
      consider it important (the "reasonable investor" standard from the SEC). GAAP does not mandate specific dollar
      thresholds; materiality is a judgment based on both quantitative and qualitative factors.
  - question: What is the cost constraint on financial reporting information?
    answer: >-
      The **cost constraint** is a pervasive consideration in the conceptual framework: the benefits of providing
      financial information should justify the costs of gathering and presenting it. When benefits do not outweigh
      costs, full disclosure or specific measurement may not be required.


      For example, the FASB may allow simplified accounting alternatives for private companies or small reporting
      companies because the cost of complex disclosures (e.g., variable interest entities, defined benefit pension
      details) may outweigh the benefit to users of those entities' statements.
  - question: How are prior period errors corrected under ASC 250?
    answer: >-
      Under ASC 250-10, a **material error** discovered in previously issued financial statements is corrected by a
      **restatement** (retrospective approach):

      1. Restate prior period financial statements presented for comparison.

      2. Adjust the beginning retained earnings of the earliest period presented for the cumulative effect.

      3. Disclose the nature of the error and the effect on each financial statement line for each period presented.


      An immaterial error need not be restated but may be corrected in the current period. The phrase "as restated"
      appears on corrected prior-period statements.
  - question: How is a change in accounting principle reflected in financial statements under ASC 250?
    answer: >-
      Most changes in accounting principle require **retrospective application**: recast all prior period comparative
      statements as if the new principle had always been used. The cumulative effect adjusts beginning retained earnings
      of the earliest period presented.


      Exceptions where only prospective application is required: - Impractical to determine period-specific effects. -
      The FASB mandates prospective treatment for a specific ASU (e.g., some lease transition methods).

      The change must be disclosed with reasons for preferability of the new principle.
  - question: What is the inventory turnover ratio and days' sales in inventory?
    answer: >-
      **Inventory turnover** = COGS ÷ Average inventory. Measures how efficiently inventory is managed; higher turnover
      generally indicates faster-selling inventory.


      **Days' sales in inventory** = 365 ÷ Inventory turnover (or Ending inventory ÷ COGS × 365). Measures how many
      days' worth of COGS is held in inventory. Together these ratios appear in the cash conversion cycle.
  - question: What is the receivables turnover and average collection period?
    answer: >-
      **Receivables turnover** = Net credit sales ÷ Average net accounts receivable. Measures how quickly receivables
      convert to cash.


      **Average collection period (days' sales outstanding, DSO)** = 365 ÷ Receivables turnover. A rising DSO may signal
      collection problems or liberal credit terms. These ratios help analyze the operating (cash conversion) cycle.
  - question: What is the cash conversion cycle and why does it matter?
    answer: >-
      The **cash conversion cycle (CCC)** measures the time between a company paying for inventory and collecting cash
      from customers:


      CCC = Days' inventory outstanding (DIO) + Days' sales outstanding (DSO) − Days' payables outstanding (DPO)


      A shorter CCC indicates better working capital management. FAR tests directional analysis: for example, extending
      payables increases DPO and shortens the CCC.
  - question: How are interest paid and taxes paid handled in the cash flow statement under U.S. GAAP?
    answer: >-
      Under U.S. GAAP:

      - **Interest paid** = **Operating activity** (may be disclosed separately in supplemental disclosures).

      - **Taxes paid** = **Operating activity** (unless specifically identifiable with financing or investing).


      Under IFRS, companies have a choice: interest paid may be **operating or financing**; dividends paid may be
      **operating or financing**; interest and dividends received may be **operating or investing**. This GAAP vs. IFRS
      difference is frequently tested on BAR.
  - question: What is the purpose of the statement of stockholders' equity?
    answer: >-
      The **statement of stockholders' equity** presents a reconciliation of each equity component (common stock, APIC,
      retained earnings, AOCI, treasury stock, NCI) between the beginning and ending of the period.


      It captures: net income, OCI, dividends declared, stock issuances/repurchases/retirements, stock-based
      compensation, accounting changes, and prior-period adjustments. It links the income statement (net income feed) to
      the balance sheet (ending equity balances).
  - question: What are off-balance-sheet arrangements and why are they disclosed?
    answer: >-
      **Off-balance-sheet arrangements** are transactions or relationships that can affect an entity's financial
      condition, revenues, expenses, results of operations, liquidity, or capital resources, but may not be reflected on
      the face of the balance sheet.


      Examples: operating leases (pre-ASC 842), synthetic leases, certain guarantees, VIEs not consolidated, take-or-
      pay contracts. SEC registrants must disclose off-balance-sheet arrangements in MD&A. After ASC 842, operating
      leases are now on-balance-sheet, reducing common off-balance-sheet exposure.
  - question: How are guarantees disclosed and potentially accrued under GAAP?
    answer: >-
      Under ASC 460, a **guarantee** must be recorded at **fair value** at inception (as a liability), even if no
      payment is probable. Subsequently, the guarantee liability decreases as it is amortized or released.


      Additionally, under the loss contingency framework, if a loss under the guarantee is probable and estimable, it
      must be accrued. FAR tests the distinction: the initial fair value recognition is separate from the contingent
      loss accrual.
  - question: What are common-size financial statements and how are they used?
    answer: >-
      **Common-size statements** express each line item as a percentage of a base figure:

      - Income statement: percentage of **net revenues**.

      - Balance sheet: percentage of **total assets**.


      They allow comparison across companies of different sizes and over time regardless of absolute dollar differences.
      CPA candidates use them in ratio analysis and trend analysis questions. A common-size income statement showing
      COGS at 65% and SG&A at 20% immediately reveals the cost structure.
  - question: What are the primary financial statement ratios tested in CPA FAR for profitability?
    answer: |-
      Key profitability ratios:
      - **Gross profit margin** = Gross profit ÷ Net sales
      - **Operating profit margin** = Operating income ÷ Net sales
      - **Net profit margin** = Net income ÷ Net sales
      - **Return on assets (ROA)** = Net income ÷ Average total assets
      - **Return on equity (ROE)** = Net income ÷ Average equity
      - **Asset turnover** = Net sales ÷ Average total assets

      DuPont: ROE = Net profit margin × Asset turnover × Equity multiplier.
  - question: What is the payout ratio and retention (plowback) ratio?
    answer: >-
      **Payout ratio** = Dividends per share ÷ EPS (or total dividends ÷ net income). Measures what fraction of earnings
      is paid out as dividends.


      **Retention ratio** = 1 − Payout ratio. Measures what fraction is reinvested (retained). A high retention ratio
      supports faster growth; a high payout ratio returns more to shareholders. These ratios factor into sustainable
      growth rate analysis and dividend policy questions on FAR.
  - question: How is book value per share different from market value per share?
    answer: >-
      **Book value per share** = (Stockholders' equity − Preferred liquidation value) ÷ Common shares outstanding. It
      reflects the historical cost basis of recorded net assets.


      **Market value per share** = Current trading price. It reflects investor expectations of future earnings and cash
      flows, risk, and growth — all forward-looking factors not captured by historical cost accounting. The difference
      between market and book value is often large for intangible-heavy companies (tech, pharma) where internally
      generated intangibles are not recognized on the balance sheet.
  - question: What is the price-earnings (P/E) ratio and how is it used by analysts?
    answer: >-
      **P/E ratio** = Market price per share ÷ Earnings per share.


      It measures how much investors pay per dollar of earnings. A high P/E suggests high growth expectations or low
      risk; a low P/E may indicate a value stock or declining business. FAR does not heavily test P/E interpretation,
      but BAR uses it in financial analysis. CPA candidates should know the formula and that trailing P/E uses
      historical EPS while forward P/E uses projected EPS.
  - question: How is the statement of cash flows used to assess quality of earnings?
    answer: >-
      **Quality of earnings** analysis compares **operating cash flows** to **net income**. Large, persistent gaps (net
      income >> operating cash flows) may signal aggressive revenue recognition, channel stuffing, or non-cash income
      items.


      Common reconciliation items to scrutinize: large increases in receivables or deferred revenue, growing intangible
      amortization backing out prior acquisitions, and extraordinary gains boosting net income without cash impact. FAR
      may ask how a change in accounts receivable or inventory affects operating cash flow.
  - question: What are the major differences between IFRS and U.S. GAAP in financial statement presentation?
    answer: |-
      Key IFRS vs. GAAP presentation differences:
      - IFRS uses **statement of financial position** (GAAP: balance sheet).
      - IFRS allows reverse liquidity ordering (noncurrent before current). GAAP: current first (generally).
      - IFRS requires a **minimum of two years** for all periods presented. GAAP: two years for balance sheet; three
        years for income statement (SEC registrants).

      - IFRS income statement may show **expenses by nature or by function**. GAAP shows by function (COGS, SG&A).
      - IFRS OCI reclassification is restricted for some items; GAAP recycles most OCI items into income.
  - question: What is IFRS for SMEs and when is it used?
    answer: >-
      **IFRS for SMEs** is a simplified version of full IFRS developed by the IASB for small and medium-sized entities
      that do not have public accountability and are not required to use full IFRS. It omits rarely relevant topics,
      simplifies recognition/measurement, and reduces disclosure requirements.


      In the U.S., it is not widely used (private companies often use U.S. GAAP or OCBOA). CPA candidates note it as an
      alternative framework when clients operate in jurisdictions that have adopted IFRS for SMEs.
  - question: What is the FASB's private company reporting framework (PCFR) and what simplifications does it allow?
    answer: >-
      The **Private Company Council (PCC)** works with the FASB to issue optional accounting alternatives for **private
      companies** (non-public, non-governmental, non-NFP):

      - Amortize goodwill over 10 years (straight-line) instead of testing for impairment annually.

      - Simplified VIE consolidation for common control leasing arrangements.

      - Various simplified hedge accounting and intangible recognition alternatives.


      These alternatives reduce cost and complexity for private companies that generally have fewer external users. FAR
      tests awareness of these options.
  - question: What is the role of the PCAOB in the financial reporting ecosystem?
    answer: >-
      The **Public Company Accounting Oversight Board (PCAOB)** is a nonprofit corporation established by the
      Sarbanes-Oxley Act (2002) to oversee the audits of public companies and SEC-registered brokers/dealers.


      It sets **auditing standards** (AS), **quality control standards**, and **ethics/independence rules** for
      registered public accounting firms. The PCAOB conducts inspections of audit firms. CPA candidates need this for
      AUD; on FAR, awareness of the PCAOB's role in the reporting ecosystem is helpful for regulatory questions.
  - question: What is the Sarbanes-Oxley Act and what does Section 302 and Section 404 require?
    answer: |-
      **SOX** (2002) strengthened corporate governance and financial reporting after major accounting scandals:
      - **Section 302**: CEO and CFO must **personally certify** the accuracy of financial reports filed with the
        SEC and disclose material weaknesses in internal controls.

      - **Section 404**: Management must **assess and report on internal control over financial reporting (ICFR)**;
        external auditors must **attest** to management's assessment for accelerated filers.


      SOX increased auditor accountability, restricted non-audit services, and established the PCAOB.
  - question: What is the COSO framework and how does it relate to internal controls?
    answer: >-
      The **COSO (Committee of Sponsoring Organizations)** Internal Control — Integrated Framework identifies five
      components of effective internal control:

      1. Control Environment

      2. Risk Assessment

      3. Control Activities

      4. Information and Communication

      5. Monitoring Activities


      Management uses COSO to design and assess ICFR. Auditors reference COSO when evaluating the design and operating
      effectiveness of controls. FAR may test COSO conceptually; AUD tests it extensively.
  - question: What is a review engagement and how does it differ from an audit for interim financial statements?
    answer: >-
      A **review** of interim financial statements by an independent CPA provides **limited assurance** ("nothing came
      to my attention") through primarily analytical procedures and inquiries — no confirmation, inspection, or
      observation. An **audit** provides reasonable assurance through extensive evidence gathering.


      For public companies, quarterly 10-Q financials undergo a **SAS 100 / AS 4105 review**, not a full audit. The
      annual 10-K is audited. FAR candidates should know that interim financials (10-Q) are reviewed, not audited, and
      the implications for reliability.
  - question: What supplementary information might accompany GAAP financial statements?
    answer: >-
      Supplementary information not required in the basic statements but presented alongside them includes:

      - **Required supplementary information (RSI)**: e.g., pension funding progress (GASB), oil/gas reserve data,
        MD&A (government), budgetary comparison schedules.

      - **Other supplementary schedules**: detailed schedules of expenses, segment data exceeding ASC 280
        requirements, voluntary ESG/sustainability disclosures.


      RSI is not audited but auditors perform certain prescribed procedures on it. Other supplementary information is
      covered by the auditor's report only if the auditor is engaged to report on it.
  - question: How does the percentage of completion method differ from the completed contract method for long-term contracts?
    answer: >-
      Under ASC 606, revenue from long-term contracts is recognized over time if criteria are met (performance over
      time) using an input or output method — this is the contemporary version of **percentage of completion**.


      The **completed contract method** (deferring all revenue until completion) is not generally permitted under ASC
      606 unless performance is not over time. Revenue from construction contracts meeting ASC 606 "over time" criteria
      must use an appropriate measure of progress (e.g., costs incurred to date ÷ total estimated costs).
  - question: What is the FASB's conceptual definition of an asset and a liability?
    answer: >-
      Under the revised **FASB Conceptual Framework (CON 8 and the proposed CON 6 updates)**:

      - **Asset**: a present economic resource controlled by the entity as a result of past events. An economic
        resource is a right that has the potential to produce economic benefits.

      - **Liability**: a present obligation of the entity to transfer an economic resource as a result of past events.


      Recognition requires that both the definition is met and that the information would be relevant and provides a
      faithful representation at a justifiable cost.
  - question: What is the operating cycle and why does it matter for current asset classification?
    answer: >-
      The **operating cycle** is the average time between cash outlay (for inventory) and cash receipt (from customers).
      For most companies, it is less than one year, so "one year" is the operative cutoff for current classification.


      For industries with long operating cycles (tobacco aging, winery, distilling, shipbuilding), assets that will
      convert to cash within the operating cycle are classified as **current** even if conversion exceeds 12 months.
      This nuance is tested when FAR describes a company with a >12-month inventory aging cycle.
  - question: What is the difference between a direct write-off method and the allowance method for bad debts?
    answer: |-
      - **Direct write-off method**: Bad debt expense is recorded only when a specific account is deemed uncollectible.
        Violates the matching principle; not permitted under GAAP for material amounts.


      - **Allowance method**: Estimates bad debt expense in the same period as the related revenue, using either
        the percentage-of-sales or aging-of-receivables approach. Required under GAAP. Maintains the allowance
        (contra-asset) to show net realizable value of receivables on the balance sheet.
  - question: What is a multi-entity or combined financial statement and when is it used?
    answer: >-
      **Combined financial statements** present two or more entities that are under **common control** but do not have a
      parent-subsidiary relationship (e.g., brother-sister corporations). They aggregate the financials of the related
      entities, eliminating intercompany transactions.


      They differ from **consolidated statements** (which require a parent-subsidiary relationship). Combined statements
      are used in SEC registration statements for related entities, real estate joint ventures, and management
      presentations.
  - question: What is a comparative financial statement and why are prior periods presented?
    answer: >-
      **Comparative financial statements** present the current period alongside one or more prior periods to enable
      trend analysis and year-over-year comparisons. Under GAAP, public companies present:


      - Balance sheet: two years - Income statement, SCF, equity: three years


      Prior periods are retroactively adjusted when an error correction or retrospective accounting change occurs.
      Comparatives enhance relevance and usefulness for decision-makers.
  - question: What is the purpose of the notes to the financial statements?
    answer: >-
      Notes (footnotes) are an **integral part** of the financial statements and provide:


      - Accounting policies and estimates used (the summary of significant accounting policies note is always first). -
      Quantitative details supporting financial statement line items (e.g., debt maturities, lease schedules,
        segment data, pension details, income tax reconciliation).
      - Qualitative disclosures about risks, uncertainties, commitments, contingencies, related parties, and
        subsequent events.


      Notes are required under GAAP; their omission or insufficiency can render financial statements misleading.
  - question: What is the statement of functional expenses required for certain not-for-profit organizations?
    answer: >-
      The **statement of functional expenses** disaggregates expenses by both **function** (program services vs.
      supporting activities) and **natural classification** (salaries, rent, supplies, depreciation) in a matrix format.


      Under ASC 958-205 (post ASU 2016-14), all NFPs must **disclose** the relationship between functional and natural
      classification (in the statement, notes, or schedule). Voluntary health and welfare organizations must present it
      as a **basic financial statement**. The exam tests functional vs. natural expense categories.
  - question: What are the key differences between accrual-basis GAAP and the income tax basis of accounting?
    answer: >-
      **GAAP (accrual basis)**: recognition of revenues when earned and expenses when incurred; requires adjusting
      entries, estimates (allowances, depreciation lives), and comprehensive disclosure.


      **Income tax basis**: follows Internal Revenue Code rules — revenues reported when taxable, deductions when
      deductible. Key differences: accelerated depreciation (MACRS), installment sales method, disallowed accruals
      (contingent liabilities until paid), and no goodwill impairment (tax amortization is ratable over 15 years).


      Entities using the tax basis issue financial statements that may omit deferred taxes entirely, since the basis of
      measurement is already tax-compliant.
