config:
  name: "CPA AUD: Auditing & Attestation — Ethics, Independence, and General Principles"
  description: AICPA ethics and independence, SEC/PCAOB and GAO/DOL concepts, professional skepticism, engagement
    acceptance, engagement letters, audit documentation, and governance communications for CPA AUD prep.
  questionDelay: 1
  answerDelay: 1
