config:
  name: "CPA FAR: Accounting & Financial Reporting — Balance Sheet Accounts"
  description: Cash, receivables, inventory, PPE, intangibles, investments, liabilities, leases, contingencies, and equity
    transactions tested in CPA FAR and BAR.
  questionDelay: 1
  answerDelay: 1
