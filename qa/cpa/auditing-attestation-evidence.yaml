config:
  name: "CPA AUD: Auditing & Attestation — Further Procedures and Audit Evidence"
  description: Audit evidence, data analytics, sampling, substantive procedures, estimates, inventory, investments,
    litigation, going concern, subsequent events, and management representations for CPA AUD prep.
  questionDelay: 1
  answerDelay: 1
