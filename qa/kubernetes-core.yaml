  name: "DevOps-Interview-Questions: Kubernetes Core"
  description: Core Kubernetes concepts including cluster architecture, pods, workloads, services, ingress, storage
    fundamentals, configuration, basic security, and scheduling foundations.
  questionDelay: 1
  answerDelay: 1
  youtube:
    videoId: I1UWM6nuGpk
    url: https://youtu.be/I1UWM6nuGpk
    uploadedAt: 2026-03-06T17:32:43.635Z
    privacy: public
