config:
  name: "DevOps-Interview-Questions: Kubernetes Advanced"
  description: Advanced Kubernetes topics including autoscaling, observability, CRDs and operators, cluster
    administration, kubectl workflows, GitOps, troubleshooting, managed services, and progressive delivery.
  questionDelay: 1
  answerDelay: 1
  youtube:
    videoId: MhFcs9xr_ww
    url: https://youtu.be/MhFcs9xr_ww
    uploadedAt: 2026-03-06T17:33:14.661Z
    privacy: public
